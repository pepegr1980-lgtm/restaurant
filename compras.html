<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cosméticos Pro - Ventas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:#e91e63;color:#fff;padding:15px;text-align:center}
.container{padding:20px}
.card{background:#fff;padding:15px;margin:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,.1)}
button{background:#e91e63;color:#fff;border:none;padding:8px;border-radius:5px;cursor:pointer;margin:3px}
.delete{background:red}
.carritoBtn{background:#4caf50}
.checkout{background:#000}
.producto{display:flex;justify-content:space-between;align-items:center;margin:10px 0;padding:10px;border-bottom:1px solid #ddd}
#carrito{position:fixed;top:20px;right:20px;background:#fff;padding:10px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.2);width:260px}
.qty{width:40px}
#chat{position:fixed;bottom:20px;left:20px;width:280px;background:#fff;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.2)}
#chatMessages{height:200px;overflow:auto;padding:10px;font-size:13px}
#chat input{width:65%;padding:5px}
</style>
</head>
<body>
<header>
<h2>Tienda de Cosméticos 💄</h2>
</header>

<div id="carrito">
<h4>🛒 Carrito</h4>
<div id="listaCarrito"></div>
<b>Total: $<span id="total">0</span></b><br>
<button class="checkout" id="btnWhatsApp">📲 Enviar pedido</button>
<button class="delete" id="btnVaciar">Vaciar</button>
</div>

<div id="chat">
<div id="chatMessages"></div>
<input type="text" id="msg"><button id="btnEnviar">Enviar</button>
</div>

<div class="container">
<div class="card">
<h3>Subir Inventario</h3>
<input type="file" id="excelFile">
<button id="btnSubir">Subir</button>
<button class="delete" id="btnBorrar">Borrar Todo</button>
</div>

<div class="card">
<h3>Productos</h3>
<div id="productos"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSy...",  // tu API key
  projectId: "calificaciones-9f753"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let INVENTARIO = [];
let CARRITO = [];

function limpiarNumero(v) { return Number(String(v || "").replace(/[^0-9.-]/g, "")); }
function agregarMsg(texto) { const cont = document.getElementById('chatMessages'); cont.innerHTML += `<div>${texto}</div>`; cont.scrollTop = cont.scrollHeight; }
function normalizarNombre(nombre) { nombre = nombre.toLowerCase().trim(); if (nombre.endsWith('s') && !nombre.endsWith('es')) nombre = nombre.slice(0, -1); return nombre.replace(/\b(el|la|los|las|de|del)\b/g, '').trim(); }
function similitud(a, b) { a = normalizarNombre(a); b = normalizarNombre(b); let match = 0; let minLen = Math.min(a.length, b.length); for (let i = 0; i < minLen; i++) { if (a[i] === b[i]) match++; } return match / Math.max(a.length, b.length); }
function buscarInteligente(msg) { let mejor = null, score = 0; INVENTARIO.forEach(p => { let s = similitud(msg, p.nombre); if (s > score) { score = s; mejor = p; } }); return score > 0.3 ? mejor : null; }
function textoANumero(text) { const numeros = { un: 1, una: 1, uno: 1, dos: 2, tres: 3, cuatro: 4, cinco: 5, seis: 6, siete: 7, ocho: 8, nueve: 9, diez: 10 }; if (!isNaN(text)) return parseInt(text); return numeros[text.toLowerCase()] || 0; }
function detectarCantidadYProducto(msg) { const match = msg.match(/quiero\s+(\d+|[a-z]+)\s+([\w\s]+)/i); if (match) { let cantidad = textoANumero(match[1]); let nombre = normalizarNombre(match[2].trim()); let prod = INVENTARIO.find(p => similitud(nombre, p.nombre) > 0.4); return prod ? { nombre: prod.nombre, cantidad } : null; } return null; }

function agregarCarrito(nombre, precio, cantidad = 1) { 
    let item = CARRITO.find(p => p.nombre === nombre); 
    if (item) { item.cantidad += cantidad; } else { CARRITO.push({ nombre, precio, cantidad }); } 
    renderCarrito(); 
}
function eliminarItem(i) { CARRITO.splice(i, 1); renderCarrito(); }
function vaciarCarrito() { CARRITO = []; renderCarrito(); }
function cambiarCantidad(i, val) { CARRITO[i].cantidad = parseInt(val) || 1; renderCarrito(); }
function renderCarrito() { 
    const cont = document.getElementById('listaCarrito'); 
    const totalSpan = document.getElementById('total'); 
    cont.innerHTML = ""; 
    let total = 0; 
    CARRITO.forEach((p, i) => { 
        let sub = p.precio * p.cantidad; 
        total += sub; 
        cont.innerHTML += `<div>${p.nombre} (x${p.cantidad})<br>$${p.precio} x <input class='qty' value='${p.cantidad}' onchange='window.cambiarCantidad(${i},this.value)'> = $${sub} <button class='delete' onclick='window.eliminarItem(${i})'>X</button></div><hr>`; 
    }); 
    totalSpan.innerText = total; 
}

function imprimirTicket() {
  if (CARRITO.length === 0) return alert("Carrito vacío");
  let ticket = window.open('', '_blank', 'width=300,height=600');
  if (!ticket) { alert("No se pudo abrir la ventana de impresión."); return; }
  ticket.document.write('<html><head><title>Ticket</title></head><body>');
  ticket.document.write('<h3>🛒 Pedido Cosméticos</h3><hr>');
  let total = 0;
  CARRITO.forEach(p => { let sub = p.precio * p.cantidad; total += sub; ticket.document.write('<div>' + p.nombre + ' x' + p.cantidad + ' = $' + sub + '</div>'); });
  ticket.document.write('<hr><b>Total: $' + total + '</b>');
  ticket.document.write('</body></html>');
  ticket.document.close();
  ticket.print();
}

function enviarWhatsApp() { 
    if (CARRITO.length === 0) return alert("Carrito vacío"); 
    let msg = "🛒 Pedido:%0A"; 
    let total = 0; 
    CARRITO.forEach(p => { let sub = p.precio * p.cantidad; total += sub; msg += p.nombre + ' x' + p.cantidad + ' = $' + sub + '%0A'; }); 
    msg += 'Total: $' + total; 
    window.open(`https://wa.me/521XXXXXXXXXX?text=${msg}`, "_blank"); 
}

// -------------------- NUEVO: Guardar pedido en Firebase --------------------
async function guardarPedido() {
    if (CARRITO.length === 0) return;
    try {
        const total = CARRITO.reduce((sum, p) => sum + p.precio * p.cantidad, 0);
        const pedido = {
            productos: CARRITO.map(p => ({ nombre: p.nombre, precio: p.precio, cantidad: p.cantidad })),
            total,
            fecha: new Date().toISOString()
        };
        await addDoc(collection(db, "pedidos"), pedido);
        console.log("✅ Pedido guardado en Firebase");
    } catch (error) {
        console.error("❌ Error guardando pedido:", error);
    }
}

// -------------------- Chat y carrito --------------------
async function enviar() { 
    let msg = document.getElementById('msg').value.trim().toLowerCase(); 
    if (!msg) return; 
    agregarMsg("Tú: " + msg); 
    let texto = "";

    if (msg.includes("es todo") || msg.includes("terminé")) { 
        let total = CARRITO.reduce((sum, p) => sum + p.precio * p.cantidad, 0); 
        texto = `💰 Tu cuenta es: $${total}. Gracias por tu compra!`; 
        agregarMsg("Bot: " + texto);

        // Guardar pedido en Firebase
        await guardarPedido();

        imprimirTicket(); 
        CARRITO = []; 
        renderCarrito(); 
        document.getElementById('msg').value = ""; 
        return; 
    }

    let detected = detectarCantidadYProducto(msg); 
    if (detected) { 
        agregarCarrito(detected.nombre, INVENTARIO.find(p => p.nombre === detected.nombre).precio, detected.cantidad); 
        texto = `🛒 ${detected.cantidad} x ${detected.nombre} agregado al carrito`; 
    } else { 
        let prod = buscarInteligente(msg); 
        if (prod) { 
            agregarCarrito(prod.nombre, prod.precio, 1); 
            texto = `🛒 1 x ${prod.nombre} agregado al carrito`; 
        } else { 
            texto = "Producto no encontrado"; 
        } 
    } 
    agregarMsg("Bot: " + texto); 
    document.getElementById('msg').value = ""; 
}

// -------------------- Inventario --------------------
async function subirExcel() {
  const file = document.getElementById('excelFile').files[0]; if (!file) return;
  const snap = await getDocs(collection(db, "productos"));
  let existentes = {}; snap.forEach(d => { existentes[d.data().nombre.toLowerCase()] = { id: d.id, ...d.data() }; });
  const reader = new FileReader();
  reader.onload = async e => { 
      const data = new Uint8Array(e.target.result); 
      const wb = XLSX.read(data, { type: 'array' }); 
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 }); 
      let nuevos = 0, actualizados = 0; 
      for (let i = 1; i < rows.length; i++) { 
          let r = rows[i]; 
          if (!r || !r[0]) continue; 
          let nombre = String(r[0]).trim(); 
          let precio = limpiarNumero(r[1]); 
          if (!nombre || isNaN(precio)) continue; 
          let key = nombre.toLowerCase(); 
          if (existentes[key]) { 
              await updateDoc(doc(db, "productos", existentes[key].id), { nombre, precio }); 
              actualizados++; 
          } else { 
              await addDoc(collection(db, "productos"), { nombre, precio }); 
              nuevos++; 
          } 
      } 
      alert(`✅ Subida completa\nNuevos: ${nuevos}\nActualizados: ${actualizados}`); 
      cargarProductos(); 
  };
  reader.readAsArrayBuffer(file);
}

async function borrarInventario() { 
    if (!confirm("⚠️ ¿Seguro que deseas borrar TODO el inventario?")) return; 
    const snap = await getDocs(collection(db, "productos")); 
    for (const d of snap.docs) { 
        await deleteDoc(doc(db, "productos", d.id)); 
    } 
    INVENTARIO = []; 
    cargarProductos(); 
    alert("✅ Inventario borrado"); 
}

async function cargarProductos() { 
    const cont = document.getElementById('productos'); 
    cont.innerHTML = ""; 
    INVENTARIO = []; 
    const snap = await getDocs(collection(db, "productos")); 
    snap.forEach(d => { 
        let p = d.data(); 
        INVENTARIO.push(p); 
        cont.innerHTML += `<div class='producto'><div>${p.nombre} - $${p.precio}</div><button class='carritoBtn' onclick='window.agregarCarrito("${p.nombre}",${p.precio})'>Agregar</button></div>`; 
    }); 
}
cargarProductos();

// -------------------- Eventos --------------------
document.getElementById('btnEnviar').onclick = window.enviar = enviar;
document.getElementById('btnSubir').onclick = subirExcel;
document.getElementById('btnBorrar').onclick = borrarInventario;
document.getElementById('btnWhatsApp').onclick = enviarWhatsApp;
document.getElementById('btnVaciar').onclick = vaciarCarrito;

// Exponer funciones globalmente
window.agregarCarrito = agregarCarrito;
window.eliminarItem = eliminarItem;
window.vaciarCarrito = vaciarCarrito;
window.cambiarCantidad = cambiarCantidad;
window.enviarWhatsApp = enviarWhatsApp;
window.enviar = enviar;
</script>
</body>
</html>
