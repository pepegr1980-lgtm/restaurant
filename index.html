<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mesero PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#e74c3c;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
display:grid;
grid-template-columns:2fr 1fr;
height:90vh;
}

.menuArea{
display:flex;
flex-direction:column;
overflow:auto;
}

.menu{
padding:10px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:110px;
object-fit:cover;
}

.card div{
padding:8px;
text-align:center;
}

.listaMenu{
background:white;
padding:10px;
}

.itemLista{
padding:8px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
}

.pedido{
background:white;
padding:15px;
border-left:3px solid #eee;
overflow:auto;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
margin:2px;
}

.btnAgregar{background:#2ecc71;color:white}
.btnEnviar{background:#3498db;color:white;width:100%;margin-top:10px}
.btnMas{background:#27ae60;color:white}
.btnMenos{background:#e74c3c;color:white}

input{
padding:6px;
width:100%;
margin-top:5px;
}

.alertaMesa{
display:none;
background:#27ae60;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore,collection,onSnapshot,addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig={
apiKey: "AIzaSyC4FVokHFRbbTc4rBifNyt5bvOX2CuzkWw",
  authDomain: "calificaciones-9f753.firebaseapp.com",
  databaseURL: "https://calificaciones-9f753-default-rtdb.firebaseio.com",
  projectId: "calificaciones-9f753",
  storageBucket: "calificaciones-9f753.firebasestorage.app",
  messagingSenderId: "907008005737",
  appId: "1:907008005737:web:3069998b0bad883cc574f8"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let productos=[];
let carrito=[];

const sonidoListo=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

function cargarMenu(){

onSnapshot(collection(db,"menu"),(snap)=>{

productos=[];

snap.forEach(doc=>{
productos.push(doc.data());
});

mostrarMenu();

});

}

function mostrarMenu(){

const menu=document.getElementById("menu");
const lista=document.getElementById("listaMenu");

menu.innerHTML="";
lista.innerHTML="";

if(productos.length===0){

menu.innerHTML="<div style='padding:20px'>⚠ No hay productos en Firebase</div>";
return;

}

productos.forEach(p=>{

const nombre=p.nombre||"Producto";
const precio=p.precio||0;
const imagen=p.imagen||"https://via.placeholder.com/150";

menu.innerHTML+=`
<div class="card">
<img src="${imagen}">
<div>
<b>${nombre}</b><br>
$${precio}
<br>
<button class="btnAgregar" onclick="agregarProducto('${nombre}',${precio})">
Agregar
</button>
</div>
</div>
`;

lista.innerHTML+=`
<div class="itemLista">
<span>${nombre} - $${precio}</span>
<button class="btnAgregar" onclick="agregarProducto('${nombre}',${precio})">
Agregar
</button>
</div>
`;

});

}

window.agregarProducto=(nombre,precio)=>{

let item=carrito.find(p=>p.nombre===nombre);

if(item){
item.cantidad++;
}else{
carrito.push({nombre,precio,cantidad:1});
}

renderPedido();

}

window.mas=(nombre)=>{

let item=carrito.find(p=>p.nombre===nombre);
item.cantidad++;
renderPedido();

}

window.menos=(nombre)=>{

let item=carrito.find(p=>p.nombre===nombre);
item.cantidad--;

if(item.cantidad<=0){
carrito=carrito.filter(p=>p.nombre!=nombre);
}

renderPedido();

}

function renderPedido(){

let total=0;
let html="";

carrito.forEach(p=>{

total+=p.precio*p.cantidad;

html+=`
${p.nombre} x${p.cantidad} $${p.precio*p.cantidad}
<button class="btnMas" onclick="mas('${p.nombre}')">+</button>
<button class="btnMenos" onclick="menos('${p.nombre}')">-</button>
<br>
`;

});

document.getElementById("pedido").innerHTML=html;
document.getElementById("total").innerText=total;

}

window.enviarPedido=async()=>{

const mesa=document.getElementById("mesa").value;

if(!mesa){
alert("Escribe mesa");
return;
}

await addDoc(collection(db,"comandas"),{
mesa,
productos:carrito,
total:parseFloat(document.getElementById("total").innerText),
estado:"cocina",
fecha:new Date().toLocaleString()
});

carrito=[];
renderPedido();

alert("Pedido enviado a cocina");

}

function escucharPedidosListos(){

onSnapshot(collection(db,"comandas"),(snap)=>{

snap.forEach(docSnap=>{

const d=docSnap.data();

if(d.estado==="servida"){
mostrarAlertaMesa(d.mesa);
}

});

});

}

function mostrarAlertaMesa(mesa){

const alerta=document.getElementById("alertaMesa");

alerta.innerHTML="🍽 Mesa "+mesa+" lista para servir";
alerta.style.display="block";

sonidoListo.play();

setTimeout(()=>{
alerta.style.display="none";
},5000);

}

window.onload=()=>{
cargarMenu();
escucharPedidosListos();
}

</script>

</head>

<body>

<header>🍔 Mesero PRO</header>

<div id="alertaMesa" class="alertaMesa"></div>

<div class="container">

<div class="menuArea">

<div id="menu" class="menu"></div>

<h3 style="padding-left:10px">Lista de productos</h3>

<div id="listaMenu" class="listaMenu"></div>

</div>

<div class="pedido">

<h3>Mesa</h3>
<input id="mesa">

<h3>Pedido</h3>
<div id="pedido"></div>

<h3>Total $<span id="total">0</span></h3>

<button class="btnEnviar" onclick="enviarPedido()">
Enviar a Cocina
</button>

</div>

</div>

</body>
</html>
